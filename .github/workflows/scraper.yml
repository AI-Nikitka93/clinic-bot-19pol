name: Scraper

on:
  schedule:
    # Fallback schedule: every 5 minutes (standard GitHub minimum)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows triggering from FastAPI/Vercel cron and manual triggers

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python for VPN fetcher
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests for VPN fetcher
        run: pip install requests

      - name: Fetch Dynamic Belarus/Russia VPN Config
        run: python get_by_vpn.py

      - name: Create VPN Auth File
        run: |
          echo "vpn" > auth.txt
          echo "vpn" >> auth.txt

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn resolvconf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run VPN Routes Test
        run: |
          python test_all_vpns.py

      - name: Disconnect VPN
        if: always()
        run: |
          sudo killall openvpn || true
