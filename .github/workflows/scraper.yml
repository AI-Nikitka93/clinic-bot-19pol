name: Scraper

on:
  schedule:
    # Запуск каждые 5 минут
    - cron: '*/5 * * * *'
  workflow_dispatch: # Позволяет запускать вручную или через API

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python for VPN fetcher
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests for VPN fetcher
        run: pip install requests

      - name: Keep Vercel Lambda Warm
        run: curl -s -I https://19pol.vercel.app/health

      - name: Fetch Dynamic Belarus VPN Config
        id: fetch-vpn
        run: |
          python get_by_vpn.py && echo "VPN_FOUND=true" >> $GITHUB_ENV || {
            exit_code=$?
            if [ $exit_code -eq 10 ]; then
              echo "VPN_FOUND=false" >> $GITHUB_ENV
            else
              exit $exit_code
            fi
          }

      - name: Create VPN Auth File
        if: env.VPN_FOUND == 'true'
        run: |
          echo "vpn" > auth.txt
          echo "vpn" >> auth.txt

      - name: Install OpenVPN
        if: env.VPN_FOUND == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn resolvconf

      - name: Connect to VPN
        if: env.VPN_FOUND == 'true'
        run: |
          sudo openvpn --config client.ovpn --auth-user-pass auth.txt --log openvpn.log --daemon
          # Ожидание поднятия интерфейса и обновления маршрутов
          sleep 15

      - name: Verify IP and Location
        if: env.VPN_FOUND == 'true'
        run: |
          echo "=== OPENVPN LOGS ==="
          sudo cat openvpn.log || true
          echo "====================="
          echo "Current Public IP:"
          curl -s https://ifconfig.me || echo "Failed to get IP"
          echo "IP Details:"
          curl -s ipinfo.io || echo "Failed to get location details"

      - name: Verify Clinic Connection
        if: env.VPN_FOUND == 'true'
        run: |
          echo "Testing connection to clinic site..."
          if curl -I --fail --connect-timeout 10 http://self.19crp.by:8028/ticket/ ; then
            echo "CLINIC_CONNECTED=true" >> $GITHUB_ENV
            echo "Connection successful!"
          else
            echo "CLINIC_CONNECTED=false" >> $GITHUB_ENV
            echo "Failed to connect to clinic. Skipping scraper execution."
          fi

      - name: Set up Python for Scraper
        if: env.VPN_FOUND == 'true' && env.CLINIC_CONNECTED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: env.VPN_FOUND == 'true' && env.CLINIC_CONNECTED == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        if: env.VPN_FOUND == 'true' && env.CLINIC_CONNECTED == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python -m app.scraper.tasks

      - name: Disconnect VPN
        if: always() && env.VPN_FOUND == 'true'
        run: |
          sudo killall openvpn || true
